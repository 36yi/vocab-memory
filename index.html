<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>단어 암기 카드</title>
  <style>
    :root { --bg:#f6f7fb; --card:#fff; --text:#172033; --muted:#667085; --line:#e4e7ec; --accent:#2563eb; --bad:#dc2626; --good:#16a34a; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }
    .wrap { width:min(980px, calc(100% - 32px)); margin:0 auto; padding:32px 0 56px; }
    header { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:24px; }
    h1 { margin:0; font-size:28px; }
    p { margin:0; }
    .muted { color:var(--muted); }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:22px; padding:22px; box-shadow:0 8px 24px rgba(16,24,40,.06); }
    .nav { display:flex; gap:10px; flex-wrap:wrap; }
    button, select { border:1px solid var(--line); background:#fff; color:var(--text); border-radius:12px; padding:11px 14px; font-size:15px; cursor:pointer; }
    button:hover { border-color:#b7c2d4; }
    button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    button.good { background:var(--good); color:#fff; border-color:var(--good); }
    button.bad { background:var(--bad); color:#fff; border-color:var(--bad); }
    button.ghost { background:#f8fafc; }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap:10px; }
    .day-btn { padding:14px 10px; font-weight:700; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .space { justify-content:space-between; }
    .card { min-height:310px; display:flex; align-items:center; justify-content:center; text-align:center; border-radius:26px; background:linear-gradient(180deg, #fff, #f9fbff); border:1px solid var(--line); cursor:pointer; padding:30px; margin:22px 0; user-select:none; }
    .word { font-size:52px; font-weight:800; line-height:1.15; word-break:break-word; }
    .meaning { margin-top:18px; font-size:28px; color:#334155; line-height:1.4; }
    .hint { margin-top:18px; color:var(--muted); }
    .stats { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
    .chip { background:#f1f5f9; border:1px solid #e2e8f0; border-radius:999px; padding:8px 12px; color:#334155; }
    .list { display:grid; gap:10px; margin-top:16px; }
    .item { display:flex; justify-content:space-between; gap:16px; align-items:center; padding:14px; border:1px solid var(--line); border-radius:14px; background:#fff; }
    .eng { font-weight:800; }
    .hidden { display:none !important; }
    @media (max-width:620px) { .word { font-size:38px; } .meaning { font-size:22px; } header { align-items:flex-start; flex-direction:column; } .item { align-items:flex-start; flex-direction:column; } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>단어 암기 카드</h1>
        <p class="muted">Day를 고르고, 카드를 눌러 뜻을 확인한 뒤 알았다/몰랐다를 선택하면 된다.</p>
      </div>
      <div class="nav">
        <button id="homeBtn">Day 선택</button>
        <button id="reviewBtn">나중에 볼 단어 <span id="reviewCount">0</span></button>
      </div>
    </header>

    <section id="home" class="panel">
      <div class="row space">
        <div>
          <h2>오늘 외울 Day 선택</h2>
          <p class="muted">총 <b id="totalWords"></b>개 단어 / <b id="totalDays"></b>일치</p>
        </div>
        <button class="ghost" id="resetAllBtn">나중에 볼 단어 전체 초기화</button>
      </div>
      <div id="dayGrid" class="grid" style="margin-top:18px"></div>
    </section>

    <section id="study" class="panel hidden">
      <div class="row space">
        <div>
          <h2 id="studyTitle">학습</h2>
          <p class="muted" id="progressText"></p>
        </div>
        <button id="backHomeBtn">Day 다시 선택</button>
      </div>
      <div class="stats">
        <span class="chip">알았다: <b id="knownCount">0</b></span>
        <span class="chip">몰랐다: <b id="unknownCount">0</b></span>
        <span class="chip">나중에 볼 단어: <b id="laterStat">0</b></span>
      </div>
      <div id="card" class="card">
        <div>
          <div id="word" class="word"></div>
          <div id="meaning" class="meaning hidden"></div>
          <div id="hint" class="hint">카드를 누르면 뜻이 나온다</div>
        </div>
      </div>
      <div class="row space">
        <div class="row">
          <button class="good" id="knownBtn" disabled>알았다</button>
          <button class="bad" id="unknownBtn" disabled>몰랐다</button>
        </div>
        <button id="nextBtn" disabled>다음 단어</button>
      </div>
    </section>

    <section id="review" class="panel hidden">
      <div class="row space">
        <div>
          <h2>나중에 볼 단어</h2>
          <p class="muted">몰랐던 단어만 모아서 다시 볼 수 있다. 필요 없으면 목록에서 해제하면 된다.</p>
        </div>
        <button class="primary" id="studyReviewBtn">이 단어들만 학습</button>
      </div>
      <div id="reviewList" class="list"></div>
    </section>
  </div>

    const KEY = 'vocab_later_words_v1';
    const $ = (id) => document.getElementById(id);

    let mode = 'home';
    let currentWords = [];
    let index = 0;
    let flipped = false;
    let answered = false;
    let known = 0;
    let unknown = 0;

    function getLaterIds() {
      try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; }
    }
    function setLaterIds(ids) {
      localStorage.setItem(KEY, JSON.stringify([...new Set(ids)]));
      refreshLaterCount();
    }
    function addLater(id) { setLaterIds([...getLaterIds(), id]); }
    function removeLater(id) { setLaterIds(getLaterIds().filter(x => x !== id)); renderReview(); }
    function getLaterWords() {
      const ids = new Set(getLaterIds());
      return WORDS.filter(w => ids.has(w.id));
    }
    function show(name) {
      ['home','study','review'].forEach(x => $(x).classList.toggle('hidden', x !== name));
      mode = name;
      if (name === 'review') renderReview();
      refreshLaterCount();
    }
    function refreshLaterCount() {
      const n = getLaterIds().length;
      $('reviewCount').textContent = n;
      $('laterStat').textContent = n;
    }

    function renderHome() {
      const days = [...new Set(WORDS.map(w => w.dayNumber))].sort((a,b)=>a-b);
      $('totalWords').textContent = WORDS.length;
      $('totalDays').textContent = days.length;
      $('dayGrid').innerHTML = days.map(d => `<button class="day-btn" data-day="${d}">Day ${d}<br><span class="muted">${WORDS.filter(w=>w.dayNumber===d).length}개</span></button>`).join('');
      document.querySelectorAll('[data-day]').forEach(btn => btn.onclick = () => startStudy(WORDS.filter(w => w.dayNumber === Number(btn.dataset.day)), `Day ${btn.dataset.day}`));
      refreshLaterCount();
    }

    function startStudy(list, title) {
      currentWords = [...list];
      index = 0; flipped = false; answered = false; known = 0; unknown = 0;
      $('studyTitle').textContent = title + ' 학습';
      show('study');
      renderCard();
    }

    function renderCard() {
      if (currentWords.length === 0) {
        $('word').textContent = '단어가 없다';
        $('meaning').textContent = '';
        $('meaning').classList.add('hidden');
        $('hint').textContent = '나중에 볼 단어가 없거나 Day 데이터가 비어있다.';
        $('progressText').textContent = '';
        $('knownBtn').disabled = true; $('unknownBtn').disabled = true; $('nextBtn').disabled = true;
        return;
      }
      if (index >= currentWords.length) {
        $('word').textContent = '끝';
        $('meaning').textContent = `알았다 ${known}개 / 몰랐다 ${unknown}개`;
        $('meaning').classList.remove('hidden');
        $('hint').textContent = '학습이 끝났다.';
        $('progressText').textContent = `${currentWords.length}개 완료`;
        $('knownBtn').disabled = true; $('unknownBtn').disabled = true; $('nextBtn').disabled = true;
        return;
      }
      const w = currentWords[index];
      flipped = false; answered = false;
      $('word').textContent = w.english;
      $('meaning').textContent = w.meaning;
      $('meaning').classList.add('hidden');
      $('hint').textContent = '카드를 누르면 뜻이 나온다';
      $('progressText').textContent = `${index + 1} / ${currentWords.length}`;
      $('knownBtn').disabled = true; $('unknownBtn').disabled = true; $('nextBtn').disabled = true;
      $('knownCount').textContent = known; $('unknownCount').textContent = unknown;
      refreshLaterCount();
    }

    function flipCard() {
      if (index >= currentWords.length || flipped) return;
      flipped = true;
      $('meaning').classList.remove('hidden');
      $('hint').textContent = '알았다 / 몰랐다를 선택해라';
      $('knownBtn').disabled = false;
      $('unknownBtn').disabled = false;
    }
    function answer(isKnown) {
      if (!flipped || answered || index >= currentWords.length) return;
      answered = true;
      if (isKnown) known++; else { unknown++; addLater(currentWords[index].id); }
      $('knownCount').textContent = known; $('unknownCount').textContent = unknown;
      $('knownBtn').disabled = true; $('unknownBtn').disabled = true; $('nextBtn').disabled = false;
      $('hint').textContent = isKnown ? '알았다로 처리됨' : '나중에 볼 단어에 저장됨';
    }
    function nextWord() { index++; renderCard(); }

    function renderReview() {
      const list = getLaterWords();
      $('studyReviewBtn').disabled = list.length === 0;
      $('reviewList').innerHTML = list.length ? list.map(w => `
        <div class="item">
          <div><span class="chip">Day ${w.dayNumber}</span> <span class="eng">${escapeHtml(w.english)}</span><div class="muted" style="margin-top:6px">${escapeHtml(w.meaning)}</div></div>
          <button data-remove="${w.id}">목록에서 해제</button>
        </div>`).join('') : '<p class="muted">아직 나중에 볼 단어가 없다.</p>';
      document.querySelectorAll('[data-remove]').forEach(btn => btn.onclick = () => removeLater(btn.dataset.remove));
      refreshLaterCount();
    }
    function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    $('homeBtn').onclick = () => show('home');
    $('reviewBtn').onclick = () => show('review');
    $('backHomeBtn').onclick = () => show('home');
    $('card').onclick = flipCard;
    $('knownBtn').onclick = () => answer(true);
    $('unknownBtn').onclick = () => answer(false);
    $('nextBtn').onclick = nextWord;
    $('studyReviewBtn').onclick = () => startStudy(getLaterWords(), '나중에 볼 단어');
    $('resetAllBtn').onclick = () => { if (confirm('나중에 볼 단어를 전부 지울까?')) setLaterIds([]); };

    renderHome();
    show('home');
  </script>
